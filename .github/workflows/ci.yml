name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finances-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: finances-app

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: finances-app
